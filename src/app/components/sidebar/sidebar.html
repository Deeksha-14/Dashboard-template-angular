<aside class="sidebar">
  <nav>
    <ul class="menu">
      @for (item of menuItems; track item.route) {
        <li class="menu-item">
          <a 
            [routerLink]="item.route" 
            routerLinkActive="active"
            class="menu-link"
          >
            <span class="icon">{{ item.icon }}</span>
            <span class="label">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>
</aside>
